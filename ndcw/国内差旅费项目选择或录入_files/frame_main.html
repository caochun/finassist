    <script type="text/javascript">
        //处理键盘事件 禁止后退键（Backspace）密码或单行、多行文本框除外
        function forbidBackSpace(e) {
            var ev = e || window.event; //获取event对象 
            var obj = ev.target || ev.srcElement; //获取事件源 
            var t = obj.type || obj.getAttribute('type'); //获取事件源类型 
            //获取作为判断条件的事件类型 
            var vReadOnly = obj.readOnly;
            var vDisabled = obj.disabled;
            //处理undefined值情况 
            vReadOnly = (vReadOnly == undefined) ? false : vReadOnly;
            vDisabled = (vDisabled == undefined) ? true : vDisabled;
            //当敲Backspace键时，事件源类型为密码或单行、多行文本的， 
            //并且readOnly属性为true或disabled属性为true的，则退格键失效 
            var flag1 = ev.keyCode == 8 && (t == "password" || t == "text" || t == "textarea") && (vReadOnly == true || vDisabled == true);
            //当敲Backspace键时，事件源类型非密码或单行、多行文本的，则退格键失效 
            var flag2 = ev.keyCode == 8 && t != "password" && t != "text" && t != "textarea";
            //判断 
            if (flag2 || flag1) return false;
        }
        //禁止后退键 作用于Firefox、Opera
        document.onkeypress = forbidBackSpace;
        //禁止后退键  作用于IE、Chrome
        document.onkeydown = forbidBackSpace;

        document.oncontextmenu = function () {//禁止右键
            //alert("小样不给你看");
            return false;
        }
        function showFloatJZ()       //根据屏幕的大小显示两个层 
        {
            //var range = getRange();
            document.getElementById("doing").style.width = document.body.scrollWidth + "px";
            document.getElementById("doing").style.height = document.body.scrollHeight + "px";
            document.getElementById("doing").style.display = "block";
            document.getElementById("POP_JZ").style.display = "block";
        }

        function closeFloatJZ()                    //根据屏幕的大小显示两个层 
        {
            document.getElementById("doing").style.display = "none";
            document.getElementById("POP_JZ").style.display = "none";
        }

        // 监听全局键盘事件
        document.addEventListener('keydown', function (e) {
            // 判断是否按下回车键（排除在textarea中回车，避免影响换行）
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault(); // 阻止回车的默认行为（如表单提交）

                // 模拟Tab键的焦点切换
                // 获取当前页面所有可聚焦元素
                const focusableElements = document.querySelectorAll(
                    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
                );
                const currentIndex = Array.from(focusableElements).indexOf(document.activeElement);
                const nextIndex = (currentIndex + 1) % focusableElements.length; // 循环聚焦

                // 聚焦到下一个元素
                focusableElements[nextIndex].focus();
            }
        });
    </script>

    <script type="text/javascript">


        function getRange()                      //得到屏幕的大小 
        {
            var top = document.body.scrollTop;
            var left = document.body.scrollLeft;
            var height = document.body.scrollHeight;
            var width = document.body.clientWidth;

            if (top == 0 && left == 0 && height == 0 && width == 0) {
                top = document.documentElement.scrollTop;
                left = document.documentElement.scrollLeft;
                height = document.documentElement.scrollHeight;
                width = document.documentElement.clientWidth;
            }
            return { top: top, left: left, height: height, width: width };
        }

            var td = chk.parentElement;
            var table = td.parentElement.parentElement;
            var colIndex = td.cellIndex;

                table.rows[i].cells[colIndex].children[0].checked = chk.checked;
            }
