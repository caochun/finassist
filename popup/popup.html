<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>财务助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>财务助手</h1>
      <button id="btn-settings" class="icon-btn" title="设置">设置</button>
    </header>

    <!-- 设置面板 -->
    <div id="panel-settings" class="panel">
      <h2>API 设置</h2>
      <div class="form-group">
        <label for="api-key">DashScope API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label for="model-select">模型</label>
        <select id="model-select">
          <option value="qwen-plus">qwen-plus</option>
          <option value="qwen-turbo">qwen-turbo</option>
          <option value="qwen-max">qwen-max</option>
        </select>
      </div>
      <button id="btn-save-settings" class="btn btn-primary">保存设置</button>
      <hr>
      <h2>字段映射</h2>
      <button id="btn-detect-inputs" class="btn">检测页面输入框</button>
      <div id="field-mapping-list"></div>
      <button id="btn-save-mapping" class="btn btn-primary hidden">保存映射</button>
    </div>

    <!-- 主面板 -->
    <div id="panel-main" class="panel">
      <div id="drop-zone" class="drop-zone">
        <p>拖拽PDF发票到此处</p>
        <p>或</p>
        <label class="btn btn-secondary">
          选择文件
          <input type="file" id="file-input" accept=".pdf" hidden>
        </label>
      </div>

      <div id="status" class="status hidden"></div>

      <!-- 解析结果 -->
      <div id="panel-result" class="hidden">
        <h2>解析结果</h2>
        <div id="result-content"></div>
        <div class="actions">
          <button id="btn-fill" class="btn btn-primary">填入表单</button>
          <button id="btn-clear" class="btn btn-secondary">清除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
